<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - DIYBLORA</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .card { max-width: 400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #1a73e8; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #1557b0; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .del-btn { background: #ea4335; padding: 5px 10px; font-size: 12px; width: auto; }
    </style>
</head>
<body>

<div class="card">
    <h2>Admin Panel</h2>
    <input type="text" id="name" placeholder="Nama Link (Contoh: Instagram)">
    <input type="url" id="url" placeholder="URL (https://...)">
    <button onclick="saveMenu()">Tambah Menu</button>

    <h3 style="margin-top: 30px;">Daftar Menu Aktif</h3>
    <div id="admin-list">Memuat...</div>
</div>

<script>
    const dbURL = "https://diyblora-default-rtdb.asia-southeast1.firebasedatabase.app/";

    async function getMenu() {
        const response = await fetch(dbURL + ".json");
        const data = await response.json();
        const list = document.getElementById('admin-list');
        list.innerHTML = '';

        if (data) {
            Object.keys(data).forEach(id => {
                list.innerHTML += `
                    <div class="list-item">
                        <span><strong>${data[id].name}</strong></span>
                        <button class="del-btn" onclick="deleteMenu('${id}')">Hapus</button>
                    </div>`;
            });
        } else { list.innerHTML = "Belum ada menu."; }
    }

    async function saveMenu() {
        const name = document.getElementById('name').value;
        const url = document.getElementById('url').value;
        if (!name || !url) return alert("Isi semua field!");

        await fetch(dbURL + ".json", {
            method: 'POST',
            body: JSON.stringify({ name, url })
        });
        document.getElementById('name').value = '';
        document.getElementById('url').value = '';
        getMenu();
    }

    async function deleteMenu(id) {
        if (confirm("Hapus menu ini?")) {
            await fetch(`${dbURL}${id}.json`, { method: 'DELETE' });
            getMenu();
        }
    }

    window.onload = getMenu;
</script>
</body>
</html>
